services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: terris
      POSTGRES_PASSWORD: terris
      POSTGRES_DB: terris
    ports:
      - '5432:5432'
    volumes:
      - terris_pgdata:/var/lib/postgresql/data
      - ./server/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  terris_pgdata:
